version: '3.8'

services:
  zynth-scan-worker:
    build: .
    container_name: zynth-scan-worker
    ports:
      - "4000:4000"
    environment:
      # Secret key — must match SCAN_WORKER_SECRET in your Next.js .env.local
      - WORKER_SECRET=${WORKER_SECRET:-zynth-super-secret-change-me}
    # Run as root needed for raw socket access (nmap SYN scans)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
